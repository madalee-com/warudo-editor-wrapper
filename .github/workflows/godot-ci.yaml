name: "godot-ci export"
on:
  push:
    branches:
      - main
    tags:
      - v*
permissions:
  contents: write
  id-token: write
  attestations: write

env:
  GODOT_VERSION: 4.6.1
  PROJECT_PATH: .

jobs:
  export-win64:
    name: Windows x64 Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Windows x64 Build
        run: |
          mkdir -v -p build/win64
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/win64/warudo-client-electron.exe"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: win64
          path: build/win64

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [export-win64]
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          output-file: 'sbom.spdx.json'
      - name: Generate SBOM attestation
        uses: actions/attest-sbom@v2
        with:
          subject-path: |
            win64/warudo-client-electron.exe
          sbom-path: 'sbom.spdx.json'
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          preserve_order: true
          files: |
            win64/warudo-client-electron.exe
